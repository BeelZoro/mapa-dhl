<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Mapa DHL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  
<style>
html, body { height: 100%; margin: 0; }

#topbar {
position: fixed;
top: 0;
width: 100%;
height: 60px;
background: #ffcc00;
display: flex;
justify-content: center;
align-items: center;
z-index: 2000;
}

#map {
height: calc(100% - 60px);
margin-top: 60px;
}

#dashboard {
  font-family: 'Inter', sans-serif;
  position: fixed;
  left: -260px; 
  top: 80px;

  width: 240px;
  background: white;
  padding: 12px;
  border-radius: 0 10px 10px 0;

  z-index: 2000;
  transition: all 0.3s ease;
}

/* CONTAINER FIXO */
.painel-upload {
  position: fixed;
  bottom: 0px;
  right: 0px;
  z-index: 9999;

  background: white;
  padding: 15px;
  border-radius: 12px 0 0 0;

  box-shadow: -2px -2px 12px rgba(0,0,0,0.15);
}

/* BOTÕES */
.botao {
  display: block;
  width: 100%;
  margin-top: 8px;

  padding: 10px;
  border-radius: 8px;
  border: none;

  font-size: 14px;
  font-weight: 600;
  cursor: pointer;

  transition: all 0.2s ease-in-out;
}

/* BOTÃO PRINCIPAL */
.botao-principal {
  background: linear-gradient(135deg, #ffcc00, #ff9900);
  color: #000;
}

.botao-principal:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* BOTÃO SECUNDÁRIO */
.botao-secundario {
  background: #f5f5f5;
  color: #333;
}

.botao-secundario:hover {
  background: #e0e0e0;
}

/* INPUT */
.input-file {
  font-size: 13px;
}

/* BOTÃO FLUTUANTE */

#btnDashboard {
  position: fixed;
  top: 100px;
  top: 80px;
  left: 10px;

  z-index: 99999; /* maior que tudo */
  background: #ffcc00;
  color: white;

  border-radius: 50%;
  width: 50px;
  height: 50px;
}

/* DASHBOARD OCULTO */
#dashboard {
  position: fixed;
  left: -260px; /* escondido */
  top: 80px;

  width: 240px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  z-index: 2500;

  transition: all 0.3s ease;
}

#listaSugestoes div:hover {
  background: #f5f5f5;
}

#listaSugestoes {
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div id="topbar">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/DHL_Logo.svg" height="40">

<button id="btnDashboard" onclick="toggleDashboard()">
  📊
</button>

</div>

<div id="listaSugestoes" style="
  position: fixed;
  top: 115px;
  right: 10px;
  z-index: 3000;
  width: 200px;
  background: white;
  border-radius: 6px;
  border: 1px solid #ccc;
  max-height: 200px;
  overflow-y: auto;
"></div>

  
<div id="dashboard">
<h3>📊 Resumo</h3>
  
<hr>
<font type:"arial">
<p>🔵 Shoppings: <span id="qtdAzul">0</span></p>
<p>🔴 SPG: <span id="qtdVermelho">0</span></p>
<p>🟢 Lojas de rua: <span id="qtdVerde">0</span></p>
<p>🟡 Honda: <span id="qtdAmarelo">0</span></p>
<p>🟠 BYD: <span id="qtdLaranja">0</span></p>
<p>🟣 Stellantis: <span id="qtdRoxo">0</span></p>
<p>🧬 Life Science: <span id="qtdRosa">0</span></p>  
</font>
</div>

<div id="map"></div>

<div class="painel-upload">
  <input type="file" id="uploadExcel" accept=".xlsx" class="input-file">

  <button class="botao botao-principal" onclick="enviarParaGitHub()">
    🚀 Atualizar Mapa
  </button>

  <button class="botao botao-secundario" onclick="location.reload()">
    🔄 Recarregar
  </button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
//ARRAY DOS MARCADORES
  let marcadores = [];
  
// MAPA
// ==========================
const map = L.map('map', { zoomControl: false }).setView([-23.4543, -46.5337], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.control.zoom({ position: 'bottomleft' }).addTo(map);

// ==========================
// GEOCODER (BUSCA ÚNICA)
// ==========================
const geocoder = L.Control.geocoder({
  defaultMarkGeocode: false
}).addTo(map);

// ==========================
// ICONES
// ==========================
function criarIcone(cor) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width: 14px;
      height: 14px;
      background:${cor};
      border-radius:50%;
      border:2px solid white;
      box-shadow:0 0 4px rgba(0,0,0,0.5);
    "></div>`
  });
}

const iconeAzul = criarIcone("blue");
const iconeVermelho = criarIcone("red");
const iconeVerde = criarIcone("green");
const iconeAmarelo = criarIcone("gold");
const iconeLaranja = criarIcone("orange");
const iconeRoxo = criarIcone("purple");
const iconeRosa = criarIcone("pink");

// ==========================
// GRUPOS
// ==========================
const grupoAzul = L.layerGroup().addTo(map);
const grupoVermelho = L.layerGroup().addTo(map);
const grupoVerde = L.layerGroup().addTo(map);
const grupoAmarelo = L.layerGroup().addTo(map);
const grupoLaranja = L.layerGroup().addTo(map);
const grupoRoxo = L.layerGroup().addTo(map);
const grupoRosa = L.layerGroup().addTo(map);

// ==========================
// CARREGAR XLSX
// ==========================

fetch('dados_mapa.xlsx?v=' + Date.now())
  .then(res => res.arrayBuffer())
  .then(data => {

    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    const unicos = new Set();

    json.forEach(linha => {

      let nome = (linha.nome || "")
        .toString()
        .replace(/\n/g, ' ')
        .trim();

      let lat = parseFloat(linha.lat);
      let lng = parseFloat(linha.lng);
      let tipo = (linha.tipo || "").toLowerCase();

      if (!nome || isNaN(lat) || isNaN(lng)) return;

      const chave = nome + lat + lng + tipo;
      if (unicos.has(chave)) return;
      unicos.add(chave);

      let grupo, icone;

      if (tipo === "azul") { grupo = grupoAzul; icone = iconeAzul; }
      else if (tipo === "verde") { grupo = grupoVerde; icone = iconeVerde; }
      else if (tipo === "amarelo") { grupo = grupoAmarelo; icone = iconeAmarelo; }
      else if (tipo === "vermelho") { grupo = grupoVermelho; icone = iconeVermelho; }
      else if (tipo === "laranja") { grupo = grupoLaranja; icone = iconeLaranja; }
      else if (tipo === "roxo") { grupo = grupoRoxo; icone = iconeRoxo; }
      else if (tipo === "rosa") { grupo = grupoRosa; icone = iconeRosa; }

      if (grupo) {

        const marker = L.marker([lat, lng], { icon: icone })
          .bindPopup(nome)
          .addTo(grupo);

        // ✅ importante pra busca
        marcadores.push({
          nome: nome.toLowerCase(),
          marker: marker
        });

      }

    });

    atualizarDashboard();

  });

// ==========================
// BUSCA UNIFICADA
// ==========================

geocoder.on('markgeocode', function(e) {

  const busca = e.geocode.name.toLowerCase().trim();

  // 🔎 buscar em lojas
  let resultados = marcadores.filter(item =>
    item.nome.includes(busca)
  );

  if (resultados.length > 0) {

    const marker = resultados[0].marker;

    map.setView(marker.getLatLng(), 15);
    marker.openPopup();

    return;
  }

  // 📍 fallback (endereço)
  const bbox = e.geocode.bbox;
  map.fitBounds(bbox);

});

// ==========================
// DASHBOARD
// ==========================
function atualizarDashboard() {
  document.getElementById("qtdAzul").innerText = grupoAzul.getLayers().length;
  document.getElementById("qtdVermelho").innerText = grupoVermelho.getLayers().length;
  document.getElementById("qtdVerde").innerText = grupoVerde.getLayers().length;
  document.getElementById("qtdAmarelo").innerText = grupoAmarelo.getLayers().length;
  document.getElementById("qtdLaranja").innerText = grupoLaranja.getLayers().length;
  document.getElementById("qtdRoxo").innerText = grupoRoxo.getLayers().length;
  document.getElementById("qtdRosa").innerText = grupoRosa.getLayers().length;
}
    

setTimeout(() => {

  const inputBusca = document.querySelector('.leaflet-control-geocoder input');

  if (!inputBusca) return;

  // criar lista de sugestões
  const listaSugestoes = document.createElement("div");

  listaSugestoes.style.position = "absolute";
  listaSugestoes.style.top = "35px";
  listaSugestoes.style.left = "0";
  listaSugestoes.style.right = "0";
  listaSugestoes.style.background = "#fff";
  listaSugestoes.style.border = "1px solid #ccc";
  listaSugestoes.style.zIndex = "9999";
  listaSugestoes.style.maxHeight = "200px";
  listaSugestoes.style.overflowY = "auto";

  inputBusca.parentElement.style.position = "relative";
  inputBusca.parentElement.appendChild(listaSugestoes);

  inputBusca.addEventListener("input", function() {

    const termo = inputBusca.value.toLowerCase().trim();

    listaSugestoes.innerHTML = "";

    if (!termo) return;

    const resultados = marcadores.filter(item =>
      item.nome.includes(termo)
    ).slice(0, 5);

    resultados.forEach(item => {

      const option = document.createElement("div");

      option.style.padding = "6px";
      option.style.cursor = "pointer";
      option.innerText = item.nome;

      option.onclick = function() {
        map.setView(item.marker.getLatLng(), 15);
        item.marker.openPopup();

        listaSugestoes.innerHTML = "";
        inputBusca.value = "";
      };

      listaSugestoes.appendChild(option);

    });

  });

}, 500);

 </script>

</body>
</html>
