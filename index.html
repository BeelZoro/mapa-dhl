<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Mapa DHL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  
<style>

{
  font-family: 'Inter', sans-serif;
}
  
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

#topbar {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 60px;
background: #ffcc00;
display: flex;
justify-content: center;
align-items: center;
z-index: 2000;
}

#map {
  position: absolute;
  top: 60px;
  bottom: 0;
  left: 0;
  right: 0;
}

#dashboard {
  font-family: 'Inter', sans-serif;
  position: fixed;
  left: -260px; 
  top: 80px;

  width: 240px;
  background: white;
  padding: 12px;
  border-radius: 0 10px 10px 0;

  z-index: 2000;
  transition: all 0.3s ease;
}

/* CONTAINER FIXO */
.painel-upload {
  position: fixed;
  bottom: 0px;
  right: 0px;
  z-index: 999;

  background: white;
  padding: 15px;
  border-radius: 12px 0 0 0;

  box-shadow: -2px -2px 12px rgba(0,0,0,0.15);
}

/* BOTÕES */
.botao {
  display: block;
  width: 100%;
  margin-top: 8px;

  padding: 10px;
  border-radius: 8px;
  border: none;

  font-size: 14px;
  font-weight: 600;
  cursor: pointer;

  transition: all 0.2s ease-in-out;
}

/* BOTÃO PRINCIPAL */
.botao-principal {
  background: linear-gradient(135deg, #ffcc00, #ff9900);
  color: #000;
}

.botao-principal:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* BOTÃO SECUNDÁRIO */
.botao-secundario {
  background: #f5f5f5;
  color: #333;
}

.botao-secundario:hover {
  background: #e0e0e0;
}

/* INPUT */
.input-file {
  font-size: 13px;
}

/* BOTÃO FLUTUANTE */

#btnDashboard {
  position: fixed;
  top: 100px;
  top: 80px;
  left: 10px;

  z-index: 99999; /* maior que tudo */
  background: #ffcc00;
  color: white;

  border-radius: 50%;
  width: 50px;
  height: 50px;
}

/* DASHBOARD OCULTO */
#dashboard {
  position: fixed;
  left: -260px; /* escondido */
  top: 80px;

  width: 240px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  z-index: 2500;

  transition: all 0.3s ease;
}
  
#painelInfo {
  font-family: 'Inter', sans-serif;
  position: fixed;
  left: -320px; /* começa escondido */
  top: 80px;

  width: 300px;

  background: white;
  padding: 15px;

  border-radius: 0 10px 10px 0;
  box-shadow: 4px 0 12px rgba(0,0,0,0.2);

  z-index: 5000;
  transition: all 0.3s ease;
}

#listaSugestoes div:hover {
  background: #f5f5f5;
}

#listaSugestoes {
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.leaflet-control {
  font-family: 'Inter', sans-serif !important;
}

.leaflet-control-geocoder input {
  font-family: 'Inter', sans-serif !important;
}

.leaflet-control-layers {
  font-family: 'Inter', sans-serif !important;
}

/* efeito pulse contínuo */
@keyframes pulseMarker {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.15);
  }
  100% {
    transform: scale(1);
  }
}

@keyframes pulseGlow {
  0% {
    box-shadow: 0 0 0 0 rgba(41, 98, 255, 0.6);
  }
  70% {
    box-shadow: 0 0 0 12px rgba(41, 98, 255, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(41, 98, 255, 0);
  }
}

.pulse-marker {
  border-radius: 50%;
  animation: pulseGlow 1.5s infinite;
}

.titulo-dash {
  font-weight: 600;
  margin-bottom: 10px;
}

.card {
  display: flex;
  justify-content: space-between;
  align-items: center;

  margin: 8px 0;
  padding: 10px;

  border-radius: 8px;
  background: #f5f5f5;

  font-size: 14px;
}

.card strong {
  font-size: 18px;
}

.card.total {
  background: linear-gradient(135deg, #ffcc00, #ff9900);
  color: #000;
  font-weight: bold;
}
 
#painelInfo {
  position: absolute;
  top: 80px;
  left: -350px;

  width: 260px;
  padding: 15px;

  background: #ffffff;
  border-radius: 12px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.15);

  transition: left 0.3s ease;
  z-index: 2000;
}

/* título */
#tituloInfo {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 10px;
}

/* CEP */
#cepInfo {
  font-size: 13px;
  color: #666;
  margin-bottom: 10px;
}

/* descrição */
#descricaoInfo {
  font-size: 14px;
  line-height: 1.4;
}

</style>
</head>

<body>
  
font-family: 'Inter', sans-serif;
  
<div id="topbar">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/DHL_Logo.svg" height="40">

<button id="btnDashboard" onclick="toggleDashboard()">
  📊
</button>

</div>

<div id="dashboard">

<h3 class="titulo-dash">📊 Resumo</h3>
<hr>

<div class="card">
  <span>🔵 Shoppings</span>
  <strong id="qtdAzul">0</strong>
</div>

<div class="card">
  <span>🔴 SPG</span>
  <strong id="qtdVermelho">0</strong>
</div>

<div class="card">
  <span>🟢 Lojas de rua</span>
  <strong id="qtdLojasRua">0</strong>
</div>

<div class="card">
  <span>🟡 Honda</span>
  <strong id="qtdAmarelo">0</strong>
</div>

<div class="card">
  <span>🟠 BYD</span>
  <strong id="qtdLaranja">0</strong>
</div>

<div class="card">
  <span>🟣 Stellantis</span>
  <strong id="qtdRoxo">0</strong>
</div>
  
<div class="card">
  <span>🟤 Dedicado</span>
  <strong id="qtdMarrom">0</strong>
  
</div>
<div class="card">
  <span>🧬 Life Science</span>
  <strong id="qtdRosa">0</strong>
</div>
  
<div class="card">
  <span>⛓️ Malha</span>
  <strong id="qtdAquamarine">0</strong>
</div>
  
<hr>

<div class="card total">
  <span>📦 Total</span>
  <strong id="totalGeral">0</strong>
</div>

</div>

<div id="painelInfo">
  <h3 id="tituloInfo"></h3>
  <p id="cepInfo"></p>
  <p id="descricaoInfo"></p>
</div>

<div id="map"></div>

<div class="painel-upload">
  <input type="file" id="uploadExcel" accept=".xlsx" class="input-file">

  <button class="botao botao-principal" onclick="enviarParaGitHub()">
    🚀 Atualizar Mapa
  </button>

  <button class="botao botao-secundario" onclick="location.reload()">
    🔄 Recarregar
  </button>

</div>

<div id="painelInfo" style="
  position: fixed;
  right: -300px;
  top: 80px;
  width: 300px;
  height: auto;

  background: white;
  padding: 15px;

  border-radius: 10px 0 0 10px;
  box-shadow: -4px 0 12px rgba(0,0,0,0.2);

  z-index: 5000;
  transition: all 0.3s ease;
">

  <button id="fecharPainel" style="
    float: right;
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
  ">
    ❌
  </button>

  <h3 id="tituloPainel">Nome</h3>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let markerAtivo = null;  
let marcadores = [];
let marcadorSelecionado = null;  
// ✅ MAPA
const map = L.map('map', {
  zoomControl: false // remove zoom padrão
}).setView([-23.4543, -46.5337], 11);

map.on("click", function() {

});
  
L.control.zoom({
  position: 'bottomleft'
}).addTo(map);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

geocoder.on('markgeocode', function(e) {

  const busca = e.geocode.name.toLowerCase();

  let encontrado = null;

  for (let item of marcadores) {
    if (item.nomeBusca.includes(busca)) {
      encontrado = item;
      break;
    }
  }

  if (encontrado) {

    const latlng = encontrado.marker.getLatLng();

    map.setView(latlng, 16);

    // ✅ ABRE O PAINEL (ESSENCIAL)
    abrirPainelInfo(
      encontrado.nomeOriginal,
      encontrado.descricao,
      encontrado.cep
    );

    abrirPainel();

    animarMarker(encontrado.marker);

  } else {

    // fallback → comportamento original do geocoder
    const bbox = e.geocode.bbox;
    map.fitBounds(bbox);

  }

});
 
function criarIcone(cor) {

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 41" width="20" height="33">
    <path fill="${cor}" d="M12.5 0C5.6 0 0 5.6 0 12.5C0 21.4 12.5 41 12.5 41C12.5 41 25 21.4 25 12.5C25 5.6 19.4 0 12.5 0Z"/>
  </svg>`;

  return new L.Icon({
    iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    iconSize: [20, 33],
    iconAnchor: [10, 33]
  });

}

// ✅ CORES
const iconeAzul = criarIcone("#2962FF");
const iconeVermelho = criarIcone("#D50000");
const iconeVerde = criarIcone("#00C853");
const iconeVerdeEscuro = criarIcone("#006400");
const iconeAmarelo = criarIcone("#FFD600");
const iconeLaranja = criarIcone("#FF6D00");
const iconeRoxo = criarIcone("#6A1B9A");
const iconeRosa = criarIcone("#FF1493");  
const iconeMarrom = criarIcone("#D2691E");   
const iconeAquamarine = criarIcone("#7FFFD4");  

// ✅ GRUPOS
const grupoAzul = L.layerGroup().addTo(map);
const grupoVermelho = L.layerGroup().addTo(map);
const grupoVerde = L.layerGroup().addTo(map);
const grupoVerdeEscuro = L.layerGroup().addTo(map);  
const grupoAmarelo = L.layerGroup().addTo(map);
const grupoLaranja = L.layerGroup().addTo(map);
const grupoRoxo = L.layerGroup().addTo(map);
const grupoRosa = L.layerGroup().addTo(map);
const grupoMarrom = L.layerGroup().addTo(map);
const grupoAquamarine = L.layerGroup().addTo(map);  
const grupoLojasRua = L.layerGroup([
  grupoVerde,
  grupoVerdeEscuro
]);
grupoLojasRua.addTo(map);
  
// ✅ FETCH CSV
fetch('dados_mapa.xlsx?v=' + Date.now())
  .then(res => res.arrayBuffer())
  .then(data => {

    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    const unicos = new Set();

    json.forEach(linha => {

    let nome = (
      linha.nome ||
      linha.Nome ||
      linha.NOME ||
      linha["Nome"] ||
      ""
      )
      .toString()
      .replace(/\n/g, ' ')
      .trim();

      let descricao = (linha.descricao || "Sem descrição").toString().trim()
        .toString()
        .replace(/\n/g, ' ')
        .trim();
      
      let cep = (
        linha.cep ||
        linha.CEP ||
        linha.Cep ||
        linha["CEP"] ||
        ""
        )
        .toString()
        .trim();

      let lat = parseFloat(linha.lat);
      let lng = parseFloat(linha.lng);

      let tipo = (linha.tipo || "")
      .toString()
      .toLowerCase()
      .trim();

      if (!nome || isNaN(lat) || isNaN(lng)) return;

      const chave = nome + lat + lng + tipo;
      if (unicos.has(chave)) return;
      unicos.add(chave);

      let icone, grupo;

      if (tipo === "azul") { grupo = grupoAzul; icone = iconeAzul; }

      else if (tipo.includes("verde")) {
      grupo = grupoVerde;
      if (tipo.includes("escuro")) {
      grupo = grupoVerdeEscuro;  
      icone = iconeVerdeEscuro;
      } else {
      grupo = grupoVerde;  
      icone = iconeVerde;
      }
    }
      else if (tipo === "amarelo") { grupo = grupoAmarelo; icone = iconeAmarelo; }
      else if (tipo === "vermelho") { grupo = grupoVermelho; icone = iconeVermelho; }
      else if (tipo === "laranja") { grupo = grupoLaranja; icone = iconeLaranja; }
      else if (tipo === "roxo") { grupo = grupoRoxo; icone = iconeRoxo; }
      else if (tipo === "rosa") { grupo = grupoRosa; icone = iconeRosa; }
      else if (tipo === "marrom") { grupo = grupoMarrom; icone = iconeMarrom; }
      else if (tipo === "aquamarine") { grupo = grupoAquamarine; icone = iconeAquamarine; }
      if (grupo) {

const marker = L.marker([lat, lng], { icon: icone })
  .addTo(grupo);

marker.dados = {
  nome: nome,
  descricao: descricao,
  cep: cep
};

// ✅ evento separado corretamente
marker.on("click", function(e) {

  L.DomEvent.stopPropagation(e);

  const dados = this.dados;

  if (!dados) return;

  abrirPainelInfo(
    dados.nome,
    dados.descricao,
    dados.cep
  );

  const painel = document.getElementById("painelInfo");
  painel.style.left = "10px";

  animarMarker(this);

});

marcadores.push({
  nomeBusca: nome.toLowerCase(),
  nomeOriginal: nome,
  marker: marker,
  descricao: descricao,
  tipo: tipo,
  cep: cep
});

      }

    });

    // ✅ IMPORTANTE: fora do forEach
    atualizarDashboard();

  });

async function enviarParaGitHub() {

const file = document.getElementById('uploadExcel').files[0];

if (!file) {
alert("Selecione um arquivo!");
return;
}

const token = prompt("Cole seu token do GitHub:");

if (!token) {
alert("Token é obrigatório!");
return;
}

const base64 = await new Promise(resolve => {
const reader = new FileReader();
reader.onload = () => resolve(reader.result.split(',')[1]);
reader.readAsDataURL(file);
});

let sha = null;

const getFile = await fetch(
"https://api.github.com/repos/BeelZoro/mapa-dhl/contents/dados_mapa.xlsx?ref=main",
{
headers: {
"Authorization": "token " + token
}
}
);

if (getFile.ok) {
const data = await getFile.json();
sha = data.sha;
}

const upload = await fetch(
"https://api.github.com/repos/BeelZoro/mapa-dhl/contents/dados_mapa.xlsx",
{
method: "PUT",
headers: {
"Authorization": "token " + token,
"Content-Type": "application/json"
},
body: JSON.stringify({
message: "Atualização via site",
content: base64,
sha: sha,
branch: "main"
})
}
);

const result = await upload.json();

if (upload.ok) {
alert("✅ Upload realizado com sucesso!");
location.reload();
} else {
console.error(result);
alert("Erro: " + (result.message || "ver console"));
}

}

// ✅ CONTROLE
const controleLayers = L.control.layers(null, {
"🔵 Shoppings": grupoAzul,
"🔴 SPG": grupoVermelho,
"🟢 Lojas de rua": grupoLojasRua,
"🟡 Honda": grupoAmarelo,
"🟠 BYD": grupoLaranja,
"🟣 Stellantis": grupoRoxo,
"🟤 Dedicado": grupoMarrom,
"🧬 Life Science": grupoRosa,
"⛓️ Malha": grupoRosa  
}, {collapsed:false}).addTo(map);

setTimeout(() => {

  const container = document.querySelector('.leaflet-control-layers-list');

  if (!container) return;

  const div = document.createElement("div");

  div.innerHTML = `
    <label style="font-weight:bold;">
      <input type="checkbox" id="checkTodosMapa">
      ✅ Selecionar Todos
    </label>
    <hr style="margin:5px 0;">
  `;

  container.insertBefore(div, container.firstChild);

  document.getElementById("checkTodosMapa").addEventListener("change", function(e) {
    toggleTodosMapa(e.target.checked);
  });

}, 500);

// ✅ CHECKBOX
function selecionarTodos(ativo) {
if (ativo) {
grupoAzul.addTo(map);
grupoLojasRua.addTo(map);
grupoVermelho.addTo(map);
grupoAmarelo.addTo(map);
grupoLaranja.addTo(map);
grupoRoxo.addTo(map);
grupoRosa.addTo(map);  
grupoMarrom.addTo(map);
grupoAquamarine.addTo(map);   
}
}

function removerTodos(ativo) {
if (ativo) {
map.removeLayer(grupoAzul);
map.removeLayer(grupoLojasRua);
map.removeLayer(grupoVermelho);
map.removeLayer(grupoAmarelo);
map.removeLayer(grupoLaranja);
map.removeLayer(grupoRoxo);
map.removeLayer(grupoRosa);
map.removeLayer(grupoMarrom);  
map.removeLayer(grupoAquamarine);  
}
}

// ✅ DASHBOARD
function atualizarDashboard() {

  const qtdAzul = grupoAzul.getLayers().length;
  const qtdVermelho = grupoVermelho.getLayers().length;
  const qtdLojasRua = grupoVerde.getLayers().length + grupoVerdeEscuro.getLayers().length;
  const qtdAmarelo = grupoAmarelo.getLayers().length;
  const qtdLaranja = grupoLaranja.getLayers().length;
  const qtdRoxo = grupoRoxo.getLayers().length;
  const qtdRosa = grupoRosa.getLayers().length;
  const qtdMarrom = grupoMarrom.getLayers().length;
  const qtdAquamarine = grupoAquamarine.getLayers().length;
  
  document.getElementById("qtdAzul").innerText = qtdAzul;
  document.getElementById("qtdVermelho").innerText = qtdVermelho;
  document.getElementById("qtdLojasRua").innerText = qtdLojasRua;
  document.getElementById("qtdAmarelo").innerText = qtdAmarelo;
  document.getElementById("qtdLaranja").innerText = qtdLaranja;
  document.getElementById("qtdRoxo").innerText = qtdRoxo;
  document.getElementById("qtdRosa").innerText = qtdRosa;
  document.getElementById("qtdMarrom").innerText = qtdMarrom;
  document.getElementById("qtdAquamarine").innerText = qtdAquamarine;

  // ✅ TOTAL CORRETO
  const total =
    qtdAzul +
    qtdVermelho +
    qtdLojasRua +
    qtdAmarelo +
    qtdLaranja +
    qtdRoxo +
    qtdRosa +
    qtdMarrom +
    qtdAquamarine;
  
  document.getElementById("totalGeral").innerText = total;

}

let dashboardAberto = false;

function toggleDashboard() {

  const dash = document.getElementById("dashboard");

  if (dashboardAberto) {
    dash.style.left = "-260px";
  } else {
    dash.style.left = "70px";
  }

  dashboardAberto = !dashboardAberto;
}

function toggleTodosMapa(ativo) {

  const layersControl = document.querySelectorAll(
    '.leaflet-control-layers-overlays input[type="checkbox"]'
  );

  layersControl.forEach(input => {
    if (input.checked !== ativo) {
      input.click(); // sincroniza com Leaflet
    }
  });

}
  
setTimeout(() => {

  const inputBusca = document.querySelector('.leaflet-control-geocoder input');

  if (!inputBusca) return;

  const lista = document.createElement("div");

lista.style.position = "fixed"; 
lista.style.top = "70px";
lista.style.left = "10px";
lista.style.width = "250px";

lista.style.background = "#fff";
lista.style.border = "1px solid #ccc";
lista.style.zIndex = "999999999";
lista.style.maxHeight = "200px";
lista.style.overflowY = "auto";
lista.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";

document.body.appendChild(lista);
  
let indiceSelecionado = -1;

inputBusca.addEventListener("input", function() {

  const termo = inputBusca.value.toLowerCase().trim();

  lista.innerHTML = "";
  indiceSelecionado = -1;

  if (!termo) return;

  const resultados = marcadores.filter(item =>
    item.nomeBusca.includes(termo)
  ).slice(0, 5);

  resultados.forEach((item, index) => {

    const div = document.createElement("div");

    div.style.padding = "6px";
    div.style.cursor = "pointer";
    div.innerText = item.nomeOriginal;

    // ✅ HOVER (visual)
    div.addEventListener("mouseover", () => {
      destacar(index);
    });

    div.addEventListener("mouseout", () => {
      removerDestaque();
    });

    // ✅ CLICK
    div.onclick = function() {
      selecionarItem(item);
    };

    lista.appendChild(div);

  });

});

// ✅ controle de teclado
inputBusca.addEventListener("keydown", function(e) {

  const itens = lista.querySelectorAll("div");

  if (e.key === "ArrowDown") {
    indiceSelecionado = Math.min(indiceSelecionado + 1, itens.length - 1);
    destacar(indiceSelecionado);
  }

  if (e.key === "ArrowUp") {
    indiceSelecionado = Math.max(indiceSelecionado - 1, 0);
    destacar(indiceSelecionado);
  }

  if (e.key === "Enter") {
    if (indiceSelecionado >= 0 && lista.children[indiceSelecionado]) {

      const nome = lista.children[indiceSelecionado].innerText;

    }
  }
  
});

function destacar(index) {

  const itens = lista.querySelectorAll("div");

  itens.forEach(i => i.style.background = "white");

  if (itens[index]) {
    itens[index].style.background = "#e6f0ff";
    indiceSelecionado = index;
  }

}

//destacar o marker
function destacarMarker(marker) {

  // remove destaque anterior
  if (marcadorSelecionado) {
    marcadorSelecionado.setZIndexOffset(0);
  }

  // aplica destaque no novo
  marker.setZIndexOffset(1000); // traz pra frente

  marcadorSelecionado = marker;
}

function abrirPainelInfo(nome, descricao, cep) {

  const titulo = document.getElementById("tituloInfo");
  const cepEl = document.getElementById("cepInfo");
  const descEl = document.getElementById("descricaoInfo");

  if (titulo) {
    titulo.innerText = nome || "Sem nome";
  }

  if (cepEl) {
    cepEl.innerText = cep ? "CEP: " + cep : "";
  }

  if (descEl) {
    descEl.innerText = descricao || "Sem descrição";
  }

}

document.getElementById("fecharPainel").addEventListener("click", function() {
  document.getElementById("painelInfo").style.left = "-320px";
});

document.addEventListener("click", function(e) {

  const painel = document.getElementById("painelInfo");

  if (
    !painel.contains(e.target) &&
    !e.target.closest('.leaflet-marker-icon')
  ) {
    painel.style.left = "-320px";
  }

});
  
//animação no PIN
function animarMarker(marker) {

  if (!marker._icon) return;

  // 🔴 remove animação anterior
  if (markerAtivo && markerAtivo._icon) {
    markerAtivo._icon.classList.remove("pulse-marker");
  }

  // ✅ aplica no atual
  marker._icon.classList.add("pulse-marker");

  markerAtivo = marker;
}
