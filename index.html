<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Mapa DHL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<style>
html, body { height: 100%; margin: 0; }

#topbar {
position: fixed;
top: 0;
width: 100%;
height: 60px;
background: #ffcc00;
display: flex;
justify-content: center;
align-items: center;
z-index: 2000;
}

#map {
height: calc(100% - 60px);
margin-top: 60px;
}

#dashboard {
  position: fixed;
  left: -260px;
  top: 80px;

  width: 240px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  z-index: 2500;

  transition: left 0.3s ease;
}

/* CONTAINER FIXO */
.painel-upload {
  position: fixed;
  bottom: 0px;
  right: 0px;
  z-index: 9999;

  background: white;
  padding: 15px;
  border-radius: 12px 0 0 0;

  box-shadow: -2px -2px 12px rgba(0,0,0,0.15);
}

/* BOTÕES */
.botao {
  display: block;
  width: 100%;
  margin-top: 8px;

  padding: 10px;
  border-radius: 8px;
  border: none;

  font-size: 14px;
  font-weight: 600;
  cursor: pointer;

  transition: all 0.2s ease-in-out;
}

/* BOTÃO PRINCIPAL */
.botao-principal {
  background: linear-gradient(135deg, #ffcc00, #ff9900);
  color: #000;
}

.botao-principal:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* BOTÃO SECUNDÁRIO */
.botao-secundario {
  background: #f5f5f5;
  color: #333;
}

.botao-secundario:hover {
  background: #e0e0e0;
}

/* INPUT */
.input-file {
  font-size: 13px;
}

/* BOTÃO FLUTUANTE */


#btnDashboard {
  position: fixed;
  top: 100px;
  left: 10px;
  z-index: 5000;

  background: linear-gradient(135deg, #ffcc00, #ff9900);
  border: none;
  border-radius: 50%;

  width: 45px;
  height: 45px;

  font-size: 20px;
  cursor: pointer;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* DASHBOARD OCULTO */
#dashboard {
  position: fixed;
  left: -260px; /* escondido */
  top: 80px;

  width: 240px;
  background: white;
  padding: 15px;
  border-radius: 0 10px 10px 0;
  z-index: 2500;

  transition: all 0.3s ease;
}


</style>
</head>

<body>

<div id="topbar">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/DHL_Logo.svg" height="40">

<button id="btnDashboard" onclick="toggleDashboard()">
  📊
</button>

</div>

<div id="dashboard">
<h3>📊 Resumo</h3>
<label>
<input type="checkbox" onchange="selecionarTodos(this.checked)">
✅ Selecionar Todos
</label><br>

<label>
<input type="checkbox" onchange="removerTodos(this.checked)">
❌ Remover Todos
</label>

<hr>

<p>🔵 Shoppings: <span id="qtdAzul">0</span></p>
<p>🔴 SPG: <span id="qtdVermelho">0</span></p>
<p>🟢 Lojas: <span id="qtdVerde">0</span></p>
<p>🟡 Honda: <span id="qtdAmarelo">0</span></p>
<p>🟠 BYD: <span id="qtdLaranja">0</span></p>
<p>🟣 Stellantis: <span id="qtdRoxo">0</span></p>
<p>🧬 Life Science: <span id="qtdRosa">0</span></p>  
</div>

<div id="map"></div>

<div class="painel-upload">
  <input type="file" id="uploadExcel" accept=".xlsx" class="input-file">

  <button class="botao botao-principal" onclick="enviarParaGitHub()">
    🚀 Atualizar Mapa
  </button>

  <button class="botao botao-secundario" onclick="location.reload()">
    🔄 Recarregar
  </button>

</div>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

// ✅ MAPA
const map = L.map('map').setView([-23.4543, -46.5337], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.Control.geocoder().addTo(map);

// ✅ ÍCONES
function criarIcone(cor) {
const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="25" height="41">
  <path fill="${cor}" d="M12.5 0C5.6 0 0 5.6 0 12.5C0 21.4 12.5 41 12.5 41C12.5 41 25 21.4 25 12.5C25 5.6 19.4 0 12.5 0Z"/>
</svg>`;

return new L.Icon({
iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
iconSize: [25,41],
iconAnchor: [12,41]
});
}

// ✅ CORES
const iconeAzul = criarIcone("#2962FF");
const iconeVermelho = criarIcone("#D50000");
const iconeVerde = criarIcone("#00C853");
const iconeAmarelo = criarIcone("#FFD600");
const iconeLaranja = criarIcone("#FF6D00");
const iconeRoxo = criarIcone("#6A1B9A");
const iconeRosa = criarIcone("#FF1493");  

// ✅ GRUPOS
const grupoAzul = L.layerGroup().addTo(map);
const grupoVermelho = L.layerGroup().addTo(map);
const grupoVerde = L.layerGroup().addTo(map);
const grupoAmarelo = L.layerGroup().addTo(map);
const grupoLaranja = L.layerGroup().addTo(map);
const grupoRoxo = L.layerGroup().addTo(map);
const grupoRosa = L.layerGroup().addTo(map);
  
// ✅ FETCH CSV

fetch('dados_mapa.xlsx?v=' + Date.now())
  .then(res => res.arrayBuffer())
  .then(data => {

    const workbook = XLSX.read(data, { type: 'array' });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet);

    const unicos = new Set();

    json.forEach(linha => {

      let nome = (linha.nome || "")
        .toString()
        .replace(/\n/g, ' ')
        .trim();

      let lat = parseFloat(linha.lat);
      let lng = parseFloat(linha.lng);
      let tipo = (linha.tipo || "").toLowerCase();

      if (!nome || isNaN(lat) || isNaN(lng)) return;

      const chave = nome + lat + lng + tipo;
      if (unicos.has(chave)) return;
      unicos.add(chave);

      let icone, grupo;

      if (tipo === "azul") { grupo = grupoAzul; icone = iconeAzul; }
      else if (tipo === "verde") { grupo = grupoVerde; icone = iconeVerde; }
      else if (tipo === "amarelo") { grupo = grupoAmarelo; icone = iconeAmarelo; }
      else if (tipo === "vermelho") { grupo = grupoVermelho; icone = iconeVermelho; }
      else if (tipo === "laranja") { grupo = grupoLaranja; icone = iconeLaranja; }
      else if (tipo === "roxo") { grupo = grupoRoxo; icone = iconeRoxo; }
      else if (tipo === "rosa") { grupo = grupoRosa; icone = iconeRosa; }
      
      if (grupo) {
        L.marker([lat, lng], { icon: icone })
          .bindPopup(nome)
          .addTo(grupo);
      }

    });

    atualizarDashboard();

  });


async function enviarParaGitHub() {

const file = document.getElementById('uploadExcel').files[0];

if (!file) {
alert("Selecione um arquivo!");
return;
}

const token = prompt("Cole seu token do GitHub:");

if (!token) {
alert("Token é obrigatório!");
return;
}

const base64 = await new Promise(resolve => {
const reader = new FileReader();
reader.onload = () => resolve(reader.result.split(',')[1]);
reader.readAsDataURL(file);
});

let sha = null;

const getFile = await fetch(
"https://api.github.com/repos/BeelZoro/mapa-dhl/contents/dados_mapa.xlsx?ref=main",
{
headers: {
"Authorization": "token " + token
}
}
);

if (getFile.ok) {
const data = await getFile.json();
sha = data.sha;
}

const upload = await fetch(
"https://api.github.com/repos/BeelZoro/mapa-dhl/contents/dados_mapa.xlsx",
{
method: "PUT",
headers: {
"Authorization": "token " + token,
"Content-Type": "application/json"
},
body: JSON.stringify({
message: "Atualização via site",
content: base64,
sha: sha,
branch: "main"
})
}
);

const result = await upload.json();

if (upload.ok) {
alert("✅ Upload realizado com sucesso!");
location.reload();
} else {
console.error(result);
alert("Erro: " + (result.message || "ver console"));
}

}


// ✅ CONTROLE
L.control.layers(null, {
"🔵 Shoppings": grupoAzul,
"🔴 SPG": grupoVermelho,
"🟢 Lojas": grupoVerde,
"🟡 Honda": grupoAmarelo,
"🟠 BYD": grupoLaranja,
"🟣 Stellantis": grupoRoxo,
"🧬 Life Science": grupoRosa
}, {collapsed:false}).addTo(map);

// ✅ CHECKBOX
function selecionarTodos(ativo) {
if (ativo) {
grupoAzul.addTo(map);
grupoVerde.addTo(map);
grupoVermelho.addTo(map);
grupoAmarelo.addTo(map);
grupoLaranja.addTo(map);
grupoRoxo.addTo(map);
grupoRosa.addTo(map);  
}
}

function removerTodos(ativo) {
if (ativo) {
map.removeLayer(grupoAzul);
map.removeLayer(grupoVerde);
map.removeLayer(grupoVermelho);
map.removeLayer(grupoAmarelo);
map.removeLayer(grupoLaranja);
map.removeLayer(grupoRoxo);
map.removeLayer(grupoRosa);
}
}

// ✅ DASHBOARD
function atualizarDashboard() {
document.getElementById("qtdAzul").innerText = grupoAzul.getLayers().length;
document.getElementById("qtdVermelho").innerText = grupoVermelho.getLayers().length;
document.getElementById("qtdVerde").innerText = grupoVerde.getLayers().length;
document.getElementById("qtdAmarelo").innerText = grupoAmarelo.getLayers().length;
document.getElementById("qtdLaranja").innerText = grupoLaranja.getLayers().length;
document.getElementById("qtdRoxo").innerText = grupoRoxo.getLayers().length;
document.getElementById("qtdRosa").innerText = grupoRosa.getLayers().length;
}

function toggleDashboard() {

  const dash = document.getElementById("dashboard");
  const btn = document.getElementById("btnDashboard");

  if (dashboardAberto) {
    dash.style.left = "-260px"; // esconde
    btn.innerText = "📊";
  } else {
    dash.style.left = "60px"; // 👈 MUITO IMPORTANTE
    btn.innerText = "❌";
  }

  dashboardAberto = !dashboardAberto;
}
 
</script>

</body>
</html>
