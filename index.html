<script>

// ✅ MAPA
const map = L.map('map').setView([-23.4543, -46.5337], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.Control.geocoder().addTo(map);

// ✅ ÍCONES
function criarIcone(cor) {
const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="25" height="41">

</svg>`;

return new L.Icon({
iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
iconSize: [25,41],
iconAnchor: [12,41]
});
}

// ✅ CORES
const iconeAzul = criarIcone("#2962FF");
const iconeVermelho = criarIcone("#D50000");
const iconeVerde = criarIcone("#00C853");
const iconeAmarelo = criarIcone("#FFD600");
const iconeLaranja = criarIcone("#FF6D00");
