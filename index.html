<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<title>Mapa DHL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Leaflet -->
<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- ✅ Geocoder -->
<!-- Geocoder -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<style>
html, body { height: 100%; margin: 0; }
html, body {
  height: 100%;
  margin: 0;
}

/* ✅ TOPO (sempre acima de tudo) */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: #ffcc00;
  text-align: center;
  padding: 8px;
  z-index: 1000;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
}

#topbar img { width: 120px; }
#topbar img {
  height: 40px;
}

/* ✅ MAPA */
#map {
  width: 100%;
  height: calc(100% - 60px);
  margin-top: 60px;
}

/* ✅ Dashboard */
/* ✅ AJUSTE BUSCA (para não sobrepor logo) */
.leaflet-control-geocoder {
  margin-top: 70px !important;
}

/* ✅ DASHBOARD */
#dashboard {
  position: fixed;
  left: 10px;
  top: 80px;
  background: white;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 1001;
  z-index: 1500;
  font-family: Arial;
}

/* ✅ Botões */
#controleTotal {
  position: fixed;
  left: 10px;
  top: 260px;
  z-index: 1001;
}

#controleTotal button {
  display: block;
  margin: 5px 0;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #ffcc00;
  cursor: pointer;
  font-weight: bold;
}

/* ✅ Animação clique */
.leaflet-marker-icon {
  transition: transform 0.2s ease;
/* ✅ CHECKBOX GLOBAL */
#controleGlobal {
  margin-top: 10px;
  border-top: 1px solid #ccc;
  padding-top: 10px;
}

/* ✅ animação clique */
.leaflet-marker-icon:active {
  transform: scale(1.3);
  transition: 0.2s;
}
</style>
</head>

<body>

<!-- ✅ LOGO -->
<!-- ✅ TOPO -->
<div id="topbar">
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/DHL_Logo.svg">
</div>

<!-- ✅ DASHBOARD -->
<div id="dashboard">
  <h3>📊 Resumo</h3>

  <p>🔵 Shoppings: <span id="qtdAzul">0</span></p>
  <p>🔴 SPG: <span id="qtdVermelho">0</span></p>
  <p>🟢 Lojas de Rua Premier: <span id="qtdVerde">0</span></p>
  <p>🟢 Lojas: <span id="qtdVerde">0</span></p>
  <p>🟡 Honda: <span id="qtdAmarelo">0</span></p>
  <p>🟠 BYD: <span id="qtdLaranja">0</span></p>
  <p>🟣 Stellantis: <span id="qtdRoxo">0</span></p>
</div>

<!-- ✅ CONTROLE TOTAL -->
<div id="controleTotal">
  <button onclick="mostrarTodos()">✅ Mostrar Todos</button>
  <button onclick="ocultarTodos()">❌ Ocultar Todos</button>
  <!-- ✅ CONTROLE TOTAL -->
  <div id="controleGlobal">
    <label>
      <input type="checkbox" onchange="toggleTodos(this.checked)">
      ✅ Ativar / Desativar Todos
    </label>
  </div>
</div>

<!-- ✅ MAPA -->
<div id="map"></div>

<!-- ✅ JS -->
<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>

// ✅ MAPA
const map = L.map('map').setView([-23.4543, -46.5337], 11);

// ✅ CAMADA
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ✅ BARRA DE BUSCA
// ✅ BUSCA
L.Control.geocoder().addTo(map);

// ✅ ÍCONE
function criarIcone(corHex) {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="25" height="41">' +
              '<path fill="' + corHex + '" d="M12.5 0C5.6 0 0 5.6 0 12.5C0 21.4 12.5 41 12.5 41C12.5 41 25 21.4 25 12.5C25 5.6 19.4 0 12.5 0Z"/>' +
              '</svg>';

  return new L.Icon({
    iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41]
  });
}

// ✅ CORES
const iconeAzul = criarIcone("#2962FF");
const iconeVermelho = criarIcone("#D50000");
const iconeVerde = criarIcone("#00C853");
const iconeAmarelo = criarIcone("#FFD600");
const iconeLaranja = criarIcone("#FF6D00");
const iconeRoxo = criarIcone("#6A1B9A");

// ✅ GRUPOS
const grupoAzul = L.layerGroup();
const grupoVermelho = L.layerGroup();
const grupoVerde = L.layerGroup();
const grupoAmarelo = L.layerGroup();
const grupoLaranja = L.layerGroup();
const grupoRoxo = L.layerGroup();

// ✅ FUNÇÃO DE MARKER (SEM HOVER)
// ✅ MARKER
function criarMarker(lat, lng, icone, texto, grupo) {
  const marker = L.marker([lat, lng], { icon: icone });

  marker.bindPopup(texto);
  marker.bindTooltip(texto);

  // ✅ Animação clique
  marker.on("click", function () {
    this.setIcon(criarIcone("#000000"));
    setTimeout(() => {
      this.setIcon(icone);
    }, 300);
  });

  marker.addTo(grupo);
}

// ✅ EXEMPLO
// ✅ EXEMPLOS (teste)
criarMarker(-23.55, -46.63, iconeAzul, "Shopping", grupoAzul);
criarMarker(-23.56, -46.64, iconeVerde, "Loja", grupoVerde);




// ✅ ADICIONAR AO MAPA


// ✅ ADD AO MAPA
grupoAzul.addTo(map);
grupoVermelho.addTo(map);
grupoVerde.addTo(map);
grupoAmarelo.addTo(map);
grupoLaranja.addTo(map);
grupoRoxo.addTo(map);

// ✅ CHECKBOX
// ✅ CHECKBOX LATERAL
L.control.layers(null, {
  "🔵 Shoppings": grupoAzul,
  "🔴 SPG": grupoVermelho,
  "🟢 Lojas de Rua Premier": grupoVerde,
  "🟢 Lojas": grupoVerde,
  "🟡 Honda": grupoAmarelo,
  "🟠 BYD": grupoLaranja,
  "🟣 Stellantis": grupoRoxo
}, { collapsed: false }).addTo(map);

// ✅ BOTÕES
function mostrarTodos() {
  grupoAzul.addTo(map);
  grupoVermelho.addTo(map);
  grupoVerde.addTo(map);
  grupoAmarelo.addTo(map);
  grupoLaranja.addTo(map);
  grupoRoxo.addTo(map);
}

function ocultarTodos() {
  map.removeLayer(grupoAzul);
  map.removeLayer(grupoVermelho);
  map.removeLayer(grupoVerde);
  map.removeLayer(grupoAmarelo);
  map.removeLayer(grupoLaranja);
  map.removeLayer(grupoRoxo);
// ✅ CONTROLE GLOBAL
function toggleTodos(ativo) {
  if (ativo) {
    grupoAzul.addTo(map);
    grupoVermelho.addTo(map);
    grupoVerde.addTo(map);
    grupoAmarelo.addTo(map);
    grupoLaranja.addTo(map);
    grupoRoxo.addTo(map);
  } else {
    map.removeLayer(grupoAzul);
    map.removeLayer(grupoVermelho);
    map.removeLayer(grupoVerde);
    map.removeLayer(grupoAmarelo);
    map.removeLayer(grupoLaranja);
    map.removeLayer(grupoRoxo);
  }
}

// ✅ DASHBOARD
function atualizarDashboard() {
  document.getElementById("qtdAzul").innerText = grupoAzul.getLayers().length;
  document.getElementById("qtdVermelho").innerText = grupoVermelho.getLayers().length;
  document.getElementById("qtdVerde").innerText = grupoVerde.getLayers().length;
  document.getElementById("qtdAmarelo").innerText = grupoAmarelo.getLayers().length;
  document.getElementById("qtdLaranja").innerText = grupoLaranja.getLayers().length;
  document.getElementById("qtdRoxo").innerText = grupoRoxo.getLayers().length;
}

atualizarDashboard();

</script>

</body>
</html>
